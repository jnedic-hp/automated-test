# boards/platform-control-board.cfg
#
# Production HIL rig: Platform Control Board (STM32H745BITx) + STLINK-V3SET
# Source: ControlBrd1/CM7/ControlBrd1_CM7.cfg (STM32CubeIDE generated)

source [find interface/stlink.cfg]

transport select swd

set CHIPNAME STM32H745BITx
set BOARDNAME genericBoard

set WORKAREASIZE 0x8000

# Enable debug when in low power modes
set ENABLE_LOW_POWER 1

# Stop Watchdog counters when halted
set STOP_WATCHDOG 1

# STLink debug clock frequency (kHz)
set CLOCK_FREQ 24000

# Hardware reset — connect under reset (required for low power / WFI firmware)
reset_config srst_only srst_nogate connect_assert_srst
set CONNECT_UNDER_RESET 1
set CORE_RESET 0

# Access port and GDB port
set AP_NUM 0
set GDB_PORT 3333

set DUAL_BANK 1
set DUAL_CORE 1

source [find target/stm32h7x.cfg]
