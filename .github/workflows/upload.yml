name: Upload Firmware to JFrog

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read firmware version
        id: version
        run: |
          VERSION=$(python3 -c "
          from common.version import PLATFORM_CB_VERSION_MAJOR as A, PLATFORM_CB_VERSION_MINOR as B, PLATFORM_CB_VERSION_PATCH as C
          print(f'{A}.{B}.{C}')
          ")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_USER: ${{ secrets.JF_USER }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      - name: Upload firmware files
        run: |
          jf rt upload \
            --spec=.github/config/upload_platform_spec.json \
            --spec-vars="VERSION=${{ steps.version.outputs.value }}" \
            --fail-no-op=true

