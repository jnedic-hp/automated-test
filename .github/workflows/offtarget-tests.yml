name: Off-Target Tests

on:
  workflow_run:
    workflows: ["Flash Firmware"]
    types:
      - completed
    branches:
      - main

jobs:
  offtarget:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, linux, ARM64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install -r offtarget/requirements.txt

      - name: Run off-target tests
        run: bash scripts/run_offtarget_tests.sh

      - name: Publish test summary
        if: always()
        run: |
          python3 - <<'EOF'
          import os, xml.etree.ElementTree as ET
          tree = ET.parse("results/offtarget-results.xml")
          suite = tree.getroot()
          if suite.tag == "testsuites":
              suite = suite[0]
          tests   = int(suite.attrib.get("tests",    0))
          failures= int(suite.attrib.get("failures", 0))
          errors  = int(suite.attrib.get("errors",   0))
          skipped = int(suite.attrib.get("skipped",  0))
          passed  = tests - failures - errors - skipped
          status  = "✅ Passed" if (failures + errors) == 0 else "❌ Failed"
          lines = [
              f"## Off-Target Test Results — {status}\n",
              f"| Tests | Passed | Failed | Errors | Skipped |",
              f"|-------|--------|--------|--------|---------|",
              f"| {tests} | {passed} | {failures} | {errors} | {skipped} |",
          ]
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(lines) + "\n")
          EOF
