name: Off-Target Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  offtarget:
    runs-on: [self-hosted, linux, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install -r offtarget/requirements.txt

      - name: Run off-target tests
        run: bash scripts/run_offtarget_tests.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offtarget-results
          path: |
            results/offtarget-results.xml
            results/offtarget-report.html
